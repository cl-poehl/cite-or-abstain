name: CI

on:
  push:
    branches: [main]
  pull_request:

# Third-party actions are pinned to a commit SHA, not a moving tag: a tag can be
# repointed at new code, which would let a supply-chain change land silently in CI.
# The human-readable version is kept in the trailing comment.

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check coa/ tests/ scripts/
      - name: Test
        run: pytest -q

  wheel:
    # Installing the built wheel into a clean env catches packaging faults the editable
    # install hides: missing package data (prompt templates, py.typed) and an import path
    # that only works from the source tree.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Install wheel into a clean environment
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install dist/*.whl
      - name: Smoke-test the installed package
        # Run from / so a stray import from the source tree cannot mask a packaging bug.
        working-directory: /
        run: |
          /tmp/smoke/bin/python - <<'PY'
          import sys
          import importlib.resources as res

          import coa
          from coa.scorer import compile_report
          from coa.types import (
              CaseScore, CaseStatus, Category, Citation, CitationVerdict,
              PassageMatch, TopicalAlignment, VerificationResult,
          )

          # Core must import without any vendor SDK present.
          assert "openai" not in sys.modules and "anthropic" not in sys.modules, \
              "core import pulled in a vendor SDK"

          # Package data must ship with the wheel.
          files = res.files("coa")
          for name in ("prompts/categorize.txt", "prompts/verify_alignment.txt", "py.typed"):
              assert files.joinpath(name).is_file(), f"missing package data: {name}"

          # End-to-end scoring with no network: verdict derivation + report compile.
          v = VerificationResult(
              citation=Citation(source="X", section="9.99"),
              passage_match=PassageMatch.NOT_FOUND,
              topical_alignment=TopicalAlignment.UNCERTAIN,
              match_method="section-absent",
          )
          assert v.verdict is CitationVerdict.FABRICATED
          report = compile_report(
              [CaseScore(case_id="a", status=CaseStatus.SCORED,
                         category=Category.CITED, verifications=[v])],
              "smoke-model",
          )
          assert report.verdict_counts == {"fabricated": 1}
          assert report.confident_error_rate == 1.0
          print("wheel smoke OK:", coa.__version__)
          PY
