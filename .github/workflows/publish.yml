name: Publish to PyPI

# Third-party actions are pinned to a commit SHA rather than a moving tag or branch: both
# can be repointed at new code, which would let a supply-chain change publish silently.
# Re-pin deliberately when bumping (the readable version is in the trailing comment).

# Publishes on every version tag (e.g. `v0.7.0`) using PyPI Trusted Publishing (OIDC):
# no API tokens are stored anywhere. One-time setup on PyPI is required — see
# docs/RELEASING.md.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1 — re-pin when bumping
